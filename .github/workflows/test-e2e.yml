name: test-e2e

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test E2E
    runs-on: ubuntu-latest
    if: |
      ${{github.repository == 'robinlioret/gate-operator' }}
    strategy:
      fail-fast: false
      matrix:
        kubernetes-minor-version:
          - 1.32.0
          - 1.33.0
          - 1.34.0
          - 1.35.0

    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.1.0

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: 'go.mod'

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: kind
          version: v0.30.0
          node_image: kindest/node:v${{ matrix.kubernetes-minor-version }}
          kubectl_version: v${{ matrix.kubernetes-minor-version }}

      - name: Running Test e2e
        run: |
          go mod tidy
          make test-e2e